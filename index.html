<!DOCTYPE html>
<html lang="vi">

<body class="bg-slate-100 font-sans min-h-screen text-gray-800 relative">

            { part: "PHẦN I", type: 'mcq', id: 6, question: "Câu 6. Bằng chứng nào dưới đây được coi là bằng chứng tế bào học chứng minh tính thống nhất của sinh giới?", options: [ { id: 'A', text: 'Mã di truyền là mã bộ ba.', isCorrect: false }, { id: 'B', text: 'Tất cả các cơ thể sinh vật đều cấu tạo từ tế bào.', isCorrect: true }, { id: 'C', text: 'DNA của tất cả các loài sinh vật đều cấu tạo từ 4 loại nucleotide.', isCorrect: false }, { id: 'D', text: 'Các loài khác nhau có trình tự amino acid trên một số chuỗi polypeptide giống nhau.', isCorrect: false } ] },
            { part: "PHẦN I", type: 'mcq', id: 7, question: "Câu 7. Theo Darwin, đối tượng của chọn lọc tự nhiên là", options: [ { id: 'A', text: 'Quần thể.', isCorrect: false }, { id: 'B', text: 'Allele.', isCorrect: false }, { id: 'C', text: 'Loài.', isCorrect: false }, { id: 'D', text: 'Cá thể.', isCorrect: true } ] },

            { part: "PHẦN I", type: 'mcq', id: 9, question: "Câu 9. Theo Darwin, sự đa dạng của các giống vật nuôi và cây trồng là kết quả của quá trình", options: [ { id: 'A', text: 'Chọn lọc nhân tạo.', isCorrect: true }, { id: 'B', text: 'Chọn lọc tự nhiên.', isCorrect: false }, { id: 'C', text: 'Phát sinh biến dị cá thể.', isCorrect: false }, { id: 'D', text: 'Chăm sóc, nuôi dưỡng của con người.', isCorrect: false } ] },

            { part: "PHẦN I", type: 'mcq', id: 13, question: "Câu 13. Nguồn nguyên liệu sơ cấp của quá trình tiến hoá là", options: [ { id: 'A', text: 'Đột biến.', isCorrect: true }, { id: 'B', text: 'Nguồn gen du nhập.', isCorrect: false }, { id: 'C', text: 'Biến dị tổ hợp.', isCorrect: false }, { id: 'D', text: 'Quá trình giao phối.', isCorrect: false } ] },
            { part: "PHẦN I", type: 'mcq', id: 14, question: "Câu 14. Nhân tố nào sau đây không phải là nhân tố tiến hóa", options: [ { id: 'A', text: 'Giao phối không ngẫu nhiên.', isCorrect: false }, { id: 'B', text: 'Giao phối ngẫu nhiên.', isCorrect: true }, { id: 'C', text: 'Phiêu bạt di truyền.', isCorrect: false }, { id: 'D', text: 'Chọn lọc tự nhiên.', isCorrect: false } ] },
            { part: "PHẦN I", type: 'mcq', id: 15, question: "Câu 15. Đa số đột biến là có hại vì", options: [ { id: 'A', text: 'Thường làm mất đi khả năng sinh sản của cơ thể.', isCorrect: false }, { id: 'B', text: 'Phá vỡ các mối quan hệ hài hoà trong kiểu gen, giữa kiểu gen với môi trường.', isCorrect: true }, { id: 'C', text: 'Làm mất đi nhiều gen.', isCorrect: false }, { id: 'D', text: 'Biểu hiện ngẫu nhiên, không định hướng.', isCorrect: false } ] },
            { part: "PHẦN I", type: 'mcq', id: 16, question: "Câu 16. Phiêu bạt di truyền", options: [ { id: 'A', text: 'Luôn làm tăng vốn gene của quần thể.', isCorrect: false }, { id: 'B', text: 'Luôn làm tăng sự đa dạng di truyền của sinh vật.', isCorrect: false }, { id: 'C', text: 'Đào thải hết các allele có hại khỏi quần thể, chỉ giữ lại allele có lợi.', isCorrect: false }, { id: 'D', text: 'Làm thay đổi tần số allele không theo một hướng xác định.', isCorrect: true } ] },

            { part: "PHẦN I", type: 'mcq', id: 19, question: "Câu 19. Trong quá trình hình thành đặc điểm thích nghi, thì nhân tố đóng vai trò sàng lọc và giữ lại kiểu gen thích nghi là", options: [ { id: 'A', text: 'Đột biến.', isCorrect: false }, { id: 'B', text: 'Chọn lọc tự nhiên.', isCorrect: true }, { id: 'C', text: 'Giao phối.', isCorrect: false }, { id: 'D', text: 'Cách li.', isCorrect: false } ] },
            { part: "PHẦN I", type: 'mcq', id: 20, question: "Câu 20. Loài lúa mì (Triticum aestivum) có bộ nhiễm sắc thể 6n = 42 được hình thành bằng cơ chế", options: [ { id: 'A', text: 'Cách li địa lí.', isCorrect: false }, { id: 'B', text: 'Cách li sinh thái.', isCorrect: false }, { id: 'C', text: 'Cách li tập tính.', isCorrect: false }, { id: 'D', text: 'Lai xa kèm đa bội hoá.', isCorrect: true } ] },

            { part: "PHẦN I", type: 'mcq', id: 24, question: "Câu 24. Trong lịch sử phát triển sinh giới, dạng sinh vật xuất hiện sau cùng là", options: [ { id: 'A', text: 'Thực vật hạt trần và loài người.', isCorrect: false }, { id: 'B', text: 'Thực vật hạt kín và chim, thú.', isCorrect: false }, { id: 'C', text: 'Thực vật hạt kín và bộ khỉ.', isCorrect: false }, { id: 'D', text: 'Thực vật hạt kín và loài người.', isCorrect: true } ] },
            { part: "PHẦN I", type: 'mcq', id: 25, question: "Câu 25. Trong hệ sinh thái rừng ngập mặn, nhân tố sinh thái nào sau đây là nhân tố vô sinh?", options: [ { id: 'A', text: 'Cua.', isCorrect: false }, { id: 'B', text: 'Tôm.', isCorrect: false }, { id: 'C', text: 'Khí CO2.', isCorrect: true }, { id: 'D', text: 'Cây đước.', isCorrect: false } ] },
            { part: "PHẦN I", type: 'mcq', id: 26, question: "Câu 26. Có các loại môi trường phổ biến là:", options: [ { id: 'A', text: 'Môi trường đất, môi trường nước, môi trường trên cạn, môi trường sinh vật.', isCorrect: true }, { id: 'B', text: 'Môi trường đất, môi trường nước, môi trường trên cạn, môi trường bên trong.', isCorrect: false }, { id: 'C', text: 'Môi trường đất, môi trường nước, môi trường trên cạn, môi trường ngoài.', isCorrect: false }, { id: 'D', text: 'Môi trường đất, môi trường nước ngọt, nước mặn và trên cạn.', isCorrect: false } ] },
            { part: "PHẦN I", type: 'mcq', id: 27, question: "Câu 27. Nhận định nào dưới đây không chính xác khi nói về hiện tượng nhịp sinh học?", options: [ { id: 'A', text: 'Lá cây trinh nữ cụp lại khi bị va chạm là ví dụ về nhịp sinh học ở thực vật.', isCorrect: true }, { id: 'B', text: 'Nhịp sinh học có liên quan đến sự biến đổi có tính chu kì của điều kiện môi trường.', isCorrect: false }, { id: 'C', text: 'Nhịp sinh học có tính di truyền.', isCorrect: false }, { id: 'D', text: 'Hiện tượng gấu ngủ đông là ví dụ về nhịp sinh học ở động vật.', isCorrect: false } ] },
            { part: "PHẦN I", type: 'mcq', id: 28, question: "Câu 28. Có các loại nhân tố sinh thái nào:", options: [ { id: 'A', text: 'Nhân tố vô sinh, nhân tố hữu sinh, nhân tố sinh vật.', isCorrect: false }, { id: 'B', text: 'Nhân tố vô sinh, nhân tố hữu sinh, nhân tố con người.', isCorrect: false }, { id: 'C', text: 'Nhân tố vô sinh, nhân tố hữu sinh, nhân tố ngoại cảnh.', isCorrect: false }, { id: 'D', text: 'Nhân tố vô sinh, nhân tố hữu sinh.', isCorrect: true } ] },
            { part: "PHẦI I", type: 'mcq', id: 29, question: "Câu 29. Cá chép Việt Nam có giá trị giới hạn dưới và giới hạn trên về nhiệt độ lần lượt là 2ºC và 44ºC. Khoảng giá trị nhiệt độ này được gọi là", options: [ { id: 'A', text: 'Ổ sinh thái.', isCorrect: false }, { id: 'B', text: 'Khoảng thuận lợi.', isCorrect: false }, { id: 'C', text: 'Giới hạn sinh thái.', isCorrect: true }, { id: 'D', text: 'Vùng cực thuận.', isCorrect: false } ] },
            { part: "PHẦN I", type: 'mcq', id: 30, question: "Câu 30. Da người có thể là môi trường sống của", options: [ { id: 'A', text: 'Giun đũa kí sinh.', isCorrect: false }, { id: 'B', text: 'Chấy, rận, nấm.', isCorrect: true }, { id: 'C', text: 'Sâu.', isCorrect: false }, { id: 'D', text: 'Thực vật bậc thấp.', isCorrect: false } ] },
            { part: "PHẦN I", type: 'mcq', id: 31, question: "Câu 31. Cá chép có môi trường sống là", options: [ { id: 'A', text: 'Đất.', isCorrect: false }, { id: 'B', text: 'Nước.', isCorrect: true }, { id: 'C', text: 'Không khí.', isCorrect: false }, { id: 'D', text: 'Sinh vật.', isCorrect: false } ] },
            { part: "PHẦN I", type: 'mcq', id: 32, question: "Câu 32. Cá rô phi Việt Nam chịu lạnh đến 5,6ºC, chịu nóng đến 42ºC, các chức năng sống biểu hiện tốt nhất từ 20ºC đến 35ºC. Khoảng nhiệt độ 20ºC đến 35ºC được gọi là", options: [ { id: 'A', text: 'Giới hạn chịu đựng.', isCorrect: false }, { id: 'B', text: 'Khoảng thuận lợi.', isCorrect: true }, { id: 'C', text: 'Điểm gây chết giới hạn trên.', isCorrect: false }, { id: 'D', text: 'Điểm gây chết giới hạn dưới.', isCorrect: false } ] },
            { part: "PHẦN II", type: 'tf', id: 33, question: "Câu 1. Dựa vào hình ảnh cấu tạo xương chi trước của Người, Báo, Cá voi, Dơi. Các nhận định dưới đây là đúng hay sai?", statements: [ { id: 'a', text: 'a) Đây là những cơ quan nằm ở những vị trí tương ứng.', isTrue: true }, { id: 'b', text: 'b) Đây là những cơ quan thể hiện hướng tiến hóa phân li.', isTrue: true }, { id: 'c', text: 'c) Đây là những cơ quan tương tự.', isTrue: false }, { id: 'd', text: 'd) Gai xương rồng và tua cuốn là tương tự nhau.', isTrue: false } ] },
            { part: "PHẦN II", type: 'tf', id: 34, question: "Câu 2. Khi nói về bằng chứng tiến hóa, phát biểu sau đây là đúng hay sai?", statements: [ { id: 'a', text: 'a) Cơ quan thực hiện chức năng khác nhau, cùng nguồn gốc là tương đồng.', isTrue: true }, { id: 'b', text: 'b) Cơ quan thoái hóa phản ánh tiến hóa đồng quy.', isTrue: false }, { id: 'c', text: 'c) Trình tự axit amin càng khác xa nhau thì họ hàng càng gần.', isTrue: false }, { id: 'd', text: 'd) Mọi sinh vật đều cấu tạo từ tế bào.', isTrue: true } ] },
            { part: "PHẦN II", type: 'tf', id: 35, question: "Câu 3. Khi nói về thuyết tiến hóa hiện đại, các nhận xét sau đây là đúng hay sai?", statements: [ { id: 'a', text: 'a) Chia thành tiến hóa nhỏ và tiến hóa lớn.', isTrue: true }, { id: 'b', text: 'b) Tiến hóa nhỏ là biến đổi kiểu hình.', isTrue: false }, { id: 'c', text: 'c) Tiến hóa nhỏ hình thành các đơn vị trên loài.', isTrue: false }, { id: 'd', text: 'd) Đơn vị tiến hóa cơ sở là cá thể.', isTrue: false } ] },
            { part: "PHẦN II", type: 'tf', id: 36, question: "Câu 4. Khi nói về đặc điểm thích nghi, các nhận định dưới đây là đúng hay sai?", statements: [ { id: 'a', text: 'a) Áp lực chọn lọc lớn thì hình thành thích nghi chậm.', isTrue: false }, { id: 'b', text: 'b) Mỗi đặc điểm thích nghi chỉ hợp lý tương đối.', isTrue: true }, { id: 'c', text: 'c) Vi khuẩn kháng thuốc nhanh vì sinh sản nhanh.', isTrue: true }, { id: 'd', text: 'd) Không có DDT, ruồi đột biến kháng DDT vẫn ưu thế.', isTrue: false } ] },
            { part: "PHẦN II", type: 'tf', id: 37, question: "Câu 5. Hai loài họ hàng sống cùng khu phân bố nhưng không giao phối. Nhận định sau đúng hay sai?", statements: [ { id: 'a', text: 'a) Chúng có nơi ở khác nhau.', isTrue: true }, { id: 'b', text: 'b) Giao phối tạo ra con lai bất thụ.', isTrue: true }, { id: 'c', text: 'c) Chúng có mùa sinh sản khác nhau.', isTrue: true }, { id: 'd', text: 'd) Con lai có sức sống kém.', isTrue: true } ] },
            { part: "PHẦN II", type: 'tf', id: 38, question: "Câu 6. Các phát biểu sau về các nhân tố sinh thái là đúng hay sai?", statements: [ { id: 'a', text: 'a) Ổ sinh thái hình thành khi các nhân tố nằm trong giới hạn cho phép.', isTrue: true }, { id: 'b', text: 'b) Vô sinh bao gồm cả các nhân tố sinh học.', isTrue: false }, { id: 'c', text: 'c) Hữu sinh bao gồm cả mối quan hệ sinh vật.', isTrue: true }, { id: 'd', text: 'd) Nhân tố con người ảnh hưởng lớn đời sống sinh vật.', isTrue: true } ] },
            { part: "PHẦN II", type: 'tf', id: 39, question: "Câu 7. Khi nói về giới hạn sinh thái, các phát biểu sau là đúng hay sai?", statements: [ { id: 'a', text: 'a) Giới hạn sinh thái là khoảng xác định của nhiều nhân tố.', isTrue: false }, { id: 'b', text: 'b) Cơ thể non có giới hạn sinh thái hẹp.', isTrue: true }, { id: 'c', text: 'c) Khoảng chống chịu gây ức chế hoạt động sinh lý.', isTrue: true }, { id: 'd', text: 'd) Loài vùng cực giới hạn nhiệt độ rộng hơn xích đạo.', isTrue: false } ] },
            { part: "PHẦN III", type: 'short', id: 40, question: "Câu 1. Có bao nhiêu bằng chứng không phải giải phẫu học so sánh trong 6 ý (xem mã gốc)?", correctAnswer: "2" },
            { part: "PHẦN III", type: 'short', id: 41, question: "Câu 2. Có bao nhiêu đặc điểm phù hợp phiêu bạt di truyền trong 4 ý?", correctAnswer: "3" },
            { part: "PHẦN III", type: 'short', id: 42, question: "Câu 3. Có bao nhiêu ví dụ là cơ quan tương đồng trong 4 ý?", correctAnswer: "3" },
            { part: "PHẦN III", type: 'short', id: 43, question: "Câu 4. Loài C (lai A=12 và B=16) có bộ NST dị đa bội là bao nhiêu?", correctAnswer: "28" },
            { part: "PHẦN III", type: 'short', id: 44, question: "Câu 5. Có bao nhiêu nhân tố vô sinh trong danh sách?", correctAnswer: "5" },
            { part: "PHẦN III", type: 'short', id: 45, question: "Câu 6. Có bao nhiêu loài sống ở một loại môi trường xác định?", correctAnswer: "4" },
            { part: "PHẦN III", type: 'short', id: 46, question: "Câu 7. Có bao nhiêu đặc điểm phù hợp cây ưa sáng?", correctAnswer: "3" },
            { part: "PHẦN III", type: 'short', id: 47, question: "Câu 8. Có bao nhiêu đặc điểm thể hiện quy luật tác động của nhân tố sinh thái?", correctAnswer: "4" }
        ];

        let currentIndex = 0;
        let optionStatuses = {}; 
        let isCurrentQuestionCorrect = false;
        let firstTryCorrectCount = 0;
        let hasAttemptedCurrent = false;

        const db = getFirestore(initializeApp(JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}')));
        const auth = getAuth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-id';
        
        signInAnonymously(auth);

        window.startQuiz = () => {
            currentIndex = 0;
            firstTryCorrectCount = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('quiz-screen').classList.add('flex');
            loadQuestion();
        };

        function loadQuestion() {
            optionStatuses = {};
            isCurrentQuestionCorrect = false;
            hasAttemptedCurrent = false;
            const currentQ = quizData[currentIndex];
            
            document.getElementById('progress-text').innerText = `Câu ${currentIndex + 1} / ${quizData.length}`;
            document.getElementById('part-text').innerText = currentQ.part;
            document.getElementById('progress-bar').style.width = `${(currentIndex / quizData.length) * 100}%`;
            document.getElementById('question').innerText = currentQ.question;
            
            renderOptions();
            updateFooter();
        }

        function renderOptions() {
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            const currentQ = quizData[currentIndex];

            if (currentQ.type === 'mcq') {
                container.className = "grid grid-cols-1 md:grid-cols-2 gap-4";
                currentQ.options.forEach((opt) => {
                    const btn = document.createElement('button');
                    const status = optionStatuses[opt.id];
                    btn.className = `p-4 border-2 rounded-xl text-left transition-all ${status === 'correct' ? 'bg-emerald-50 border-emerald-500 text-emerald-700' : status === 'wrong' ? 'bg-red-50 border-red-300 text-red-700 opacity-60' : 'bg-white hover:border-emerald-300'}`;
                    btn.innerHTML = `<span class="font-bold mr-2">${opt.id}.</span> ${opt.text}`;
                    btn.onclick = () => handleMCQ(opt);
                    if(isCurrentQuestionCorrect) btn.disabled = true;
                    container.appendChild(btn);
                });
            } else if (currentQ.type === 'tf') {
                container.className = "flex flex-col gap-3";
                currentQ.statements.forEach((s) => {
                    const row = document.createElement('div');
                    const isRight = optionStatuses[s.id + '_true'] === 'correct' || optionStatuses[s.id + '_false'] === 'correct';
                    row.className = `flex justify-between items-center p-4 border-2 rounded-xl ${isRight ? 'bg-emerald-50 border-emerald-200' : 'bg-white'}`;
                    row.innerHTML = `<div class="pr-4 font-medium">${s.text}</div><div class="flex gap-2">
                        <button onclick="handleTF('${s.id}', true)" class="px-4 py-2 border rounded-lg ${optionStatuses[s.id+'_true']==='correct'?'bg-emerald-500 text-white':'bg-white'}">Đúng</button>
                        <button onclick="handleTF('${s.id}', false)" class="px-4 py-2 border rounded-lg ${optionStatuses[s.id+'_false']==='correct'?'bg-emerald-500 text-white':'bg-white'}">Sai</button>
                    </div>`;
                    container.appendChild(row);
                });
            } else if (currentQ.type === 'short') {
                container.innerHTML = `<div class="flex gap-3"><input type="text" id="short-input" class="short-input border-2 p-3 rounded-xl flex-grow font-bold"><button onclick="handleShort()" class="bg-emerald-600 text-white px-6 rounded-xl">Check</button></div>`;
            }
        }

        window.handleMCQ = (opt) => {
            if (opt.isCorrect) {
                optionStatuses[opt.id] = 'correct';
                isCurrentQuestionCorrect = true;
                if(!hasAttemptedCurrent) firstTryCorrectCount++;
            } else {
                optionStatuses[opt.id] = 'wrong';
                hasAttemptedCurrent = true;
            }
            renderOptions();
            updateFooter();
        };

        window.handleTF = (sid, val) => {
            const s = quizData[currentIndex].statements.find(x => x.id === sid);
            if(val === s.isTrue) {
                optionStatuses[sid + (val?'_true':'_false')] = 'correct';
            } else {
                hasAttemptedCurrent = true;
                alert("Sai rồi, chọn lại nhé!");
            }
            const correctCount = quizData[currentIndex].statements.filter(x => optionStatuses[x.id + (x.isTrue?'_true':'_false')] === 'correct').length;
            if(correctCount === 4) {
                isCurrentQuestionCorrect = true;
                if(!hasAttemptedCurrent) firstTryCorrectCount++;
            }
            renderOptions();
            updateFooter();
        };

        window.handleShort = () => {
            const val = document.getElementById('short-input').value.trim();
            if(val === quizData[currentIndex].correctAnswer) {
                isCurrentQuestionCorrect = true;
                if(!hasAttemptedCurrent) firstTryCorrectCount++;
            } else {
                hasAttemptedCurrent = true;
                alert("Chưa chính xác!");
            }
            renderOptions();
            updateFooter();
        };

        function updateFooter() {
            const next = document.getElementById('next-btn');
            const msg = document.getElementById('footer-message');
            if(isCurrentQuestionCorrect) {
                msg.innerHTML = '<span class="text-emerald-600 font-bold">Chính xác! Bấm nút để tiếp tục.</span>';
                next.classList.remove('hidden');
            } else {
                msg.innerHTML = '';
                next.classList.add('hidden');
            }
        }

        window.nextQuestion = () => {
            if(currentIndex < quizData.length - 1) {
                currentIndex++;
                loadQuestion();
            } else {
                finish();
            }
        };

        async function finish() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-screen').classList.add('flex');
            document.getElementById('score').innerText = firstTryCorrectCount;
            
            // Lưu kết quả ẩn danh
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'quiz_history_sinh12_gk2'), {
                    name: "Người dùng ẩn danh",
                    score: firstTryCorrectCount,
                    total: 47,
                    timestamp: Date.now(),
                    dateString: new Date().toLocaleString('vi-VN')
                });
            } catch (e) {}
        }

        window.restartQuiz = () => location.reload();

        window.openPasswordModal = () => document.getElementById('password-modal').classList.remove('hidden');
        window.closeModals = () => {
            document.getElementById('password-modal').classList.add('hidden');
            document.getElementById('history-modal').classList.add('hidden');
        };
        window.verifyPassword = () => {
            if(document.getElementById('history-password').value === '8168') {
                document.getElementById('password-modal').classList.add('hidden');
                document.getElementById('history-modal').classList.remove('hidden');
                loadHistory();
            }
        };

        function loadHistory() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'quiz_history_sinh12_gk2'), (snap) => {
                const list = document.getElementById('history-list');
                list.innerHTML = snap.docs.map(d => {
                    const h = d.data();
                    return `<div class="p-3 bg-gray-50 rounded-lg border"><b>${h.name}</b>: ${h.score}/${h.total}<br><small>${h.dateString}</small></div>`;
                }).join('');
            });
        }
    </script>
</body>
</html>
